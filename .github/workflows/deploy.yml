name: Deploy Pointwell to GitHub Pages

# Publishes the static site in outputs/ to GitHub Pages.
# Repo Settings → Pages → Source must be set to "GitHub Actions".

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; don't cancel an in-progress run.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The app lives in outputs/, so publish that folder as the site root.
          path: "outputs"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
