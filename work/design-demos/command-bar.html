<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pointwell — Command Bar</title>
<style>
:root{--bg:#050807;--panel:#0b100e;--panel-2:#0c100e;--raise:#11201a;--line:#1b2521;--line-2:#243029;--ink:#eef2f0;--ink-dim:#9fb0aa;--ink-mute:#7c8d87;--mint:#5cf3b8;--green:#3ddc97;--green-deep:#1c4d3b;--green-line:#2c5a48;--blue:#5cb0f3;--blue-bg:#0f2230;--blue-line:#244a5a;--amber:#f0c97a;--rose:#f59ab0;--r:18px;--r-sm:12px;color-scheme:dark;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{min-height:100vh;background:radial-gradient(130% 90% at 50% -20%,#0b1814 0%,#050807 55%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;padding:22px 0 40px;}

.screen{width:390px;max-width:100vw;padding:0 16px;}

/* status bar */
.status{display:flex;align-items:center;justify-content:space-between;height:34px;font-size:14px;font-weight:600;color:var(--ink);letter-spacing:.2px;}
.logo{width:26px;height:26px;background:linear-gradient(135deg,var(--mint),var(--green));color:#04140e;border-radius:8px;display:grid;place-items:center;font-weight:800;font-size:15px;box-shadow:0 4px 14px rgba(61,220,151,.28);}

/* header */
h1{font-size:24px;font-weight:700;letter-spacing:-.4px;margin:18px 0 2px;}
.sub{color:var(--ink-mute);font-size:13.5px;margin:0 0 18px;line-height:1.45;}

/* command bar */
.bar-wrap{position:relative;}
.bar{display:flex;align-items:center;gap:10px;height:58px;padding:0 14px;background:linear-gradient(180deg,#0d130f,#0a0e0c);border:1px solid var(--line-2);border-radius:16px;transition:border-color .25s cubic-bezier(.22,1,.36,1),box-shadow .25s cubic-bezier(.22,1,.36,1),transform .25s cubic-bezier(.22,1,.36,1);}
.bar.focused{border-color:var(--green-line);box-shadow:0 0 0 4px rgba(92,243,184,.13),0 8px 30px rgba(0,0,0,.45);}
.bar.flash{animation:barflash .5s cubic-bezier(.22,1,.36,1);}
@keyframes barflash{0%{box-shadow:0 0 0 4px rgba(92,243,184,.13)}40%{box-shadow:0 0 0 8px rgba(92,243,184,.32)}100%{box-shadow:0 0 0 4px rgba(92,243,184,.13)}}
.glyph{flex:0 0 auto;color:var(--ink-mute);font-size:17px;width:20px;text-align:center;transition:color .25s;}
.bar.focused .glyph{color:var(--mint);}
#cmd{flex:1;min-width:0;background:none;border:0;outline:none;color:var(--ink);font-size:16px;font-family:inherit;font-weight:500;letter-spacing:-.1px;padding:0;}
#cmd::placeholder{color:var(--ink-mute);font-weight:400;}
.logbtn{flex:0 0 auto;height:38px;padding:0 16px;border:0;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:-.1px;color:#04140e;background:linear-gradient(135deg,var(--mint),var(--green));box-shadow:0 4px 16px rgba(61,220,151,.3);cursor:pointer;opacity:0;transform:scale(.85) translateX(6px);pointer-events:none;transition:opacity .22s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1);}
.logbtn.on{opacity:1;transform:scale(1) translateX(0);pointer-events:auto;}
.logbtn:active{transform:scale(.94);}

/* parsed card */
.parse{margin-top:12px;overflow:hidden;max-height:0;opacity:0;transform:translateY(-6px);transition:max-height .32s cubic-bezier(.22,1,.36,1),opacity .26s ease,transform .3s cubic-bezier(.22,1,.36,1);}
.parse.show{max-height:200px;opacity:1;transform:translateY(0);}
.parse-card{display:flex;align-items:center;gap:13px;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);}
.parse-card.fly{animation:flyout .42s cubic-bezier(.5,0,.75,0) forwards;}
@keyframes flyout{0%{transform:scale(1.04);box-shadow:0 0 0 6px rgba(92,243,184,.28),0 10px 30px rgba(0,0,0,.5);border-color:var(--green-line);}55%{transform:scale(.98) translateY(8px);opacity:.85;}100%{transform:scale(.9) translateY(40px);opacity:0;}}
.parse-card.empty{border-style:dashed;border-color:var(--line-2);background:transparent;}
.p-emoji{flex:0 0 auto;width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-size:22px;background:var(--raise);border:1px solid var(--green-line);}
.parse-card.empty .p-emoji{background:transparent;border:1px dashed var(--line-2);font-size:19px;opacity:.7;}
.p-body{flex:1;min-width:0;}
.p-name{font-size:15.5px;font-weight:650;letter-spacing:-.2px;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;}
.p-val{color:var(--mint);font-weight:700;font-size:15px;}
.p-check{color:var(--green);font-weight:800;}
.p-meta{margin-top:3px;font-size:12.5px;color:var(--ink-mute);line-height:1.35;}
.p-meta b{color:var(--ink-dim);font-weight:650;}
.p-pts{flex:0 0 auto;align-self:center;font-size:13px;font-weight:750;color:var(--green);background:rgba(61,220,151,.1);border:1px solid var(--green-line);border-radius:999px;padding:5px 11px;letter-spacing:-.2px;}
.parse-card.empty .p-name{color:var(--ink-dim);font-weight:550;font-size:14.5px;}
.parse-card.empty .p-meta{color:var(--ink-mute);}

/* suggestion chips */
.chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 13px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;color:var(--ink-dim);font-size:13.5px;font-weight:600;font-family:inherit;letter-spacing:-.1px;cursor:pointer;transition:background .18s,border-color .18s,transform .15s,color .18s;}
.chip:hover{border-color:var(--green-line);color:var(--ink);}
.chip:active{transform:scale(.95);background:var(--raise);}
.chip .ce{font-size:15px;}

/* logged today */
.sec{display:flex;align-items:baseline;justify-content:space-between;margin:30px 2px 12px;}
.sec h2{font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-mute);margin:0;}
.pts-today{font-size:13px;font-weight:750;color:var(--green);letter-spacing:-.2px;transition:transform .3s cubic-bezier(.34,1.56,.64,1),color .3s;}
.pts-today.bump{animation:bump .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.22);color:var(--mint)}100%{transform:scale(1)}}

.list{display:flex;flex-direction:column;gap:9px;}
.item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);}
.item.fresh{animation:slidein .5s cubic-bezier(.22,1,.36,1);}
@keyframes slidein{0%{opacity:0;transform:translateY(-14px) scale(.96);box-shadow:0 0 0 5px rgba(92,243,184,.22);}60%{box-shadow:0 0 0 0 rgba(92,243,184,0);}100%{opacity:1;transform:translateY(0) scale(1);}}
.i-emoji{flex:0 0 auto;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:19px;background:var(--raise);border:1px solid var(--line-2);}
.item.fresh .i-emoji{border-color:var(--green-line);}
.i-body{flex:1;min-width:0;}
.i-name{font-size:14.5px;font-weight:600;letter-spacing:-.15px;}
.i-name .iv{color:var(--ink-dim);font-weight:600;}
.i-name .ic{color:var(--green);font-weight:800;}
.i-sub{margin-top:2px;font-size:12px;color:var(--ink-mute);}
.i-pts{flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--ink-dim);}

.empty-list{padding:22px 14px;text-align:center;color:var(--ink-mute);font-size:13px;border:1px dashed var(--line-2);border-radius:var(--r);}

/* caption */
.cap{width:390px;max-width:100vw;padding:14px 18px 0;color:var(--ink-mute);font-size:12px;line-height:1.5;text-align:center;}
</style>
</head>
<body>
<div class="screen">
  <div class="status">
    <span>9:41</span>
    <span class="logo">P</span>
  </div>

  <h1>Log anything</h1>
  <p class="sub">One bar. Type the way you think — we sort out the rest.</p>

  <div class="bar-wrap">
    <div class="bar" id="bar">
      <span class="glyph" id="glyph">⌘</span>
      <input id="cmd" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             placeholder="Steps 8000 · ran 30 min · slept 8h · lifted">
      <button class="logbtn" id="logbtn" type="button">Log</button>
    </div>

    <div class="parse" id="parse">
      <div class="parse-card empty" id="parseCard">
        <div class="p-emoji" id="pEmoji">⌨️</div>
        <div class="p-body">
          <div class="p-name" id="pName">Keep typing…</div>
          <div class="p-meta" id="pMeta">try “ran 30 min” or “sleep 8h”</div>
        </div>
        <div class="p-pts" id="pPts" style="display:none">+0 pts</div>
      </div>
    </div>
  </div>

  <div class="chips" id="chips">
    <button class="chip" data-fill="Steps 10000"><span class="ce">👟</span>Steps 10,000</button>
    <button class="chip" data-fill="lifted"><span class="ce">💪</span>Lifting ✓</button>
    <button class="chip" data-fill="sleep 8h"><span class="ce">😴</span>Sleep 8h</button>
  </div>

  <div class="sec">
    <h2>Logged today</h2>
    <span class="pts-today" id="ptsToday">+85 pts today</span>
  </div>

  <div class="list" id="list">
    <div class="item">
      <div class="i-emoji">🍗</div>
      <div class="i-body">
        <div class="i-name">Protein <span class="iv">120 g</span></div>
        <div class="i-sub">THE BOYS · 2h ago</div>
      </div>
      <div class="i-pts">+15</div>
    </div>
  </div>
</div>

<p class="cap"><b style='color:var(--ink-dim)'>Command Bar</b> — type the way you think; one bar logs anything, anywhere.</p>

<script>
(function(){
  "use strict";
  var bar    = document.getElementById('bar');
  var input  = document.getElementById('cmd');
  var parse  = document.getElementById('parse');
  var card   = document.getElementById('parseCard');
  var pEmoji = document.getElementById('pEmoji');
  var pName  = document.getElementById('pName');
  var pMeta  = document.getElementById('pMeta');
  var pPts   = document.getElementById('pPts');
  var logbtn = document.getElementById('logbtn');
  var chips  = document.getElementById('chips');
  var list   = document.getElementById('list');
  var ptsEl  = document.getElementById('ptsToday');

  var ptsToday = 85;

  // --- parser ----------------------------------------------------------
  // Each rule returns null or {emoji,name,value,check,pts,meta}
  function parseInput(raw){
    var s = (raw || '').trim().toLowerCase();
    if(!s) return null;
    var m;

    // Steps: "steps 8000" | "8000 steps" | "walked 8000"
    m = s.match(/(?:steps?|walk(?:ed|ing)?)\s*([\d,]{2,7})|([\d,]{2,7})\s*steps?/);
    if(m){
      var n = parseInt((m[1]||m[2]).replace(/,/g,''),10);
      if(n>0) return {emoji:'👟',name:'Steps',value:fmt(n),check:false,
                      pts:Math.max(5,Math.round(n/1000)*2),meta:''};
    }

    // Protein: "protein 150" | "150g protein"  (before cardio so "150g" wins)
    m = s.match(/protein\s*([\d]{1,4})|([\d]{1,4})\s*g(?:ram)?s?\s*(?:of\s*)?protein/);
    if(m){
      var g = parseInt(m[1]||m[2],10);
      if(g>0) return {emoji:'🍗',name:'Protein',value:g+' g',check:false,
                      pts:Math.max(5,Math.round(g/10)),meta:''};
    }

    // Sleep: "slept 8" | "sleep 8h" | "8h sleep"  -> yes/no 7+ hrs
    m = s.match(/(?:sleep|slept)\s*([\d.]{1,4})|([\d.]{1,4})\s*h(?:rs?|ours?)?\s*sleep/);
    if(m){
      var h = parseFloat(m[1]||m[2]);
      if(h>0) return {emoji:'😴',name:'Sleep 7+ hrs',value:'',check:true,pts:10,
                      meta:'logged '+trimNum(h)+'h'};
    }

    // Cardio: "ran 30" | "run 30 min" | "cardio 30"
    m = s.match(/(?:ran|run(?:ning)?|cardio|jog(?:ged|ging)?)\s*([\d]{1,4})/);
    if(m){
      var min = parseInt(m[1],10);
      if(min>0) return {emoji:'🏃',name:'Cardio',value:min+' min',check:false,
                        pts:Math.max(5,min),meta:''};
    }

    // Lifting: keyword-only yes/no
    if(/(?:lift(?:ed|ing)?|gym|workout|lifts)\b/.test(s)){
      return {emoji:'💪',name:'Lifting session',value:'',check:true,pts:20,meta:''};
    }

    return null;
  }

  function fmt(n){ return n.toLocaleString('en-US'); }
  function trimNum(n){ return (Math.round(n*10)/10).toString(); }

  // --- render parsed card ---------------------------------------------
  var current = null;
  function render(){
    var p = parseInput(input.value);
    current = p;

    if(!input.value.trim()){
      parse.classList.remove('show');
      setEmpty('Keep typing…','try “ran 30 min” or “sleep 8h”','⌨️');
      logbtn.classList.remove('on');
      return;
    }
    parse.classList.add('show');

    if(!p){
      card.classList.add('empty');
      pPts.style.display='none';
      pEmoji.textContent='🤔';
      pName.innerHTML='Keep typing…';
      pMeta.innerHTML='no match yet — try “ran 30 min”';
      logbtn.classList.remove('on');
      return;
    }

    card.classList.remove('empty');
    pEmoji.textContent = p.emoji;
    var valHtml = p.check
      ? '<span class="p-check">✓</span>'
      : '<span class="p-val">'+p.value+'</span>';
    pName.innerHTML = escapeHtml(p.name)+' '+valHtml;
    pMeta.innerHTML = '→ counts toward <b>THE BOYS</b> + your day';
    pPts.style.display='';
    pPts.textContent = '+'+p.pts+' pts';
    logbtn.classList.add('on');
  }

  function setEmpty(name,meta,emoji){
    card.classList.add('empty');
    pPts.style.display='none';
    pEmoji.textContent=emoji;
    pName.innerHTML=escapeHtml(name);
    pMeta.innerHTML=meta;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // --- commit a log ----------------------------------------------------
  function commit(){
    var p = current;
    if(!p) return;

    // remove empty placeholder in list if present
    var ph = list.querySelector('.empty-list');
    if(ph) ph.remove();

    // fly-out animation on the parsed card, then build the list item
    card.classList.add('fly');

    setTimeout(function(){
      var item = document.createElement('div');
      item.className='item fresh';
      var valHtml = p.check
        ? '<span class="ic">✓</span>'
        : ' <span class="iv">'+escapeHtml(p.value)+'</span>';
      item.innerHTML =
        '<div class="i-emoji">'+p.emoji+'</div>'+
        '<div class="i-body">'+
          '<div class="i-name">'+escapeHtml(p.name)+valHtml+'</div>'+
          '<div class="i-sub">THE BOYS · now</div>'+
        '</div>'+
        '<div class="i-pts">+'+p.pts+'</div>';
      list.insertBefore(item, list.firstChild);
      setTimeout(function(){ item.classList.remove('fresh'); }, 700);

      // bump running total
      ptsToday += p.pts;
      ptsEl.textContent = '+'+ptsToday+' pts today';
      ptsEl.classList.remove('bump'); void ptsEl.offsetWidth; ptsEl.classList.add('bump');

      // reset bar
      card.classList.remove('fly');
      input.value='';
      current=null;
      render();
      input.focus();
    }, 360);

    // mint flash on the bar at the moment of commit
    bar.classList.remove('flash'); void bar.offsetWidth; bar.classList.add('flash');
  }

  // --- events ----------------------------------------------------------
  input.addEventListener('input', render);
  input.addEventListener('focus', function(){ bar.classList.add('focused'); });
  input.addEventListener('blur',  function(){ bar.classList.remove('focused'); });
  input.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); if(current) commit(); }
  });
  logbtn.addEventListener('click', commit);

  chips.addEventListener('click', function(e){
    var b = e.target.closest('.chip'); if(!b) return;
    input.value = b.getAttribute('data-fill');
    render();
    input.focus();
  });

  // autofocus
  render();
  setTimeout(function(){ input.focus(); }, 120);
})();
</script>
</body>
</html>
